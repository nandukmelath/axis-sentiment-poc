name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run test suite (keyless, offline)
        env:
          PII_MASK: "1"
          CASCADE: "1"
        run: pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Byte-compile all modules
        run: python -m compileall -q analyze analytics warehouse transform fetch dags api tools db.py config.py run_window.py

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install scanners
        run: pip install bandit pip-audit
      - name: Bandit (SAST -- fail on medium+ severity)
        run: bandit -c pyproject.toml -q -r analyze analytics warehouse transform fetch api tools db.py config.py run_window.py -ll
      - name: pip-audit (dependency CVEs)
        run: pip-audit -r requirements-dev.txt || true   # advisory (don't block on upstream CVEs)
