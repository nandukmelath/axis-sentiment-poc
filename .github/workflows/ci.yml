name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dialect: [sqlite, postgres]     # prod is Postgres - gate BOTH dialects, not just SQLite
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: axis
          POSTGRES_PASSWORD: axis
          POSTGRES_DB: axis_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run test suite (keyless, offline)
        env:
          PII_MASK: "1"
          CASCADE: "1"
          # postgres leg points conftest at the service container; sqlite leg leaves it empty
          TEST_DATABASE_URL: ${{ matrix.dialect == 'postgres' && 'postgresql+psycopg2://axis:axis@localhost:5432/axis_test' || '' }}
        run: pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Byte-compile all modules
        run: python -m compileall -q analyze analytics warehouse transform fetch api tools db.py config.py run_window.py run_harvest.py

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install scanners
        run: pip install bandit pip-audit
      - name: Bandit (SAST -- fail on medium+ severity)
        run: bandit -c pyproject.toml -q -r analyze analytics warehouse transform fetch api tools db.py config.py run_window.py -ll
      - name: pip-audit (dependency CVEs)
        run: pip-audit -r requirements-dev.txt || true   # advisory (don't block on upstream CVEs)
