# One command to run the whole system on Postgres:
#   GEMINI_API_KEY=xxx docker compose up --build
# Dashboard: http://localhost:8501
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: axis
      POSTGRES_PASSWORD: axis
      POSTGRES_DB: axis
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axis"]
      interval: 5s
      timeout: 3s
      retries: 12

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://axis:axis@db:5432/axis
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
    ports:
      - "8501:8501"

  stream:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://axis:axis@db:5432/axis
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash-lite}
      CASCADE: "1"
    command: ["python", "-m", "stream.run_stream"]

volumes:
  pgdata: {}
